<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Bracket</title>
  <link rel="stylesheet" href="/style.css?vfix0424k">
</head>
<body class="page-challenge-standalone page-challenge-clean-header">
  <header class="topbar">
    <div class="brandWrap">
      <div class="brandRow">
        <div class="brand">Bracketology Builder</div>
        <img alt="Bracketology Builder logo" class="brandLogo" src="/logo.svg"/>
      </div>
      <div class="subbrand">Presented by <span class="creator">RobbyBrackets</span></div>
    </div>
    <div class="actions"></div>
  </header>

  <div class="stickyNav">
    <nav aria-label="Primary" class="siteNav">
      <a class="navLink" href="/">Home</a>
      <a class="navLink" href="my-brackets.html">My Brackets</a>
      <a class="navLink" href="best-challenge.html">Best Bracket Challenge</a>
      <a class="navLink" href="worst-challenge.html">Worst Bracket Challenge</a>
      <a class="navLink active" href="nba.html">NBA Bracket</a>
      <a class="navLink" href="/#featured">Featured Brackets</a>
      <a class="navLink" href="/#upcoming">Upcoming Events</a>
    </nav>
  </div>

  <main class="wrap">
    <div class="panel">
      <div class="panelHead">
        <h2>NBA Bracket</h2>
        <div class="subhead">Projected playoff field with play-in games and best-of-seven series picks.</div>
      </div>

      <div id="nbaBracketApp" class="nbaInteractiveApp"></div>
    </div>
  </main>

<script>
const NBA = {
  east: {
    seeds: [
      {seed:1,name:'Detroit Pistons'},
      {seed:2,name:'Boston Celtics'},
      {seed:3,name:'New York Knicks'},
      {seed:4,name:'Cleveland Cavaliers'},
      {seed:5,name:'Toronto Raptors'},
      {seed:6,name:'Atlanta Hawks'},
      {seed:7,name:'Philadelphia 76ers'},
      {seed:8,name:'Orlando Magic'},
      {seed:9,name:'Miami Heat'},
      {seed:10,name:'Charlotte Hornets'}
    ]
  },
  west: {
    seeds: [
      {seed:1,name:'Oklahoma City Thunder'},
      {seed:2,name:'San Antonio Spurs'},
      {seed:3,name:'Los Angeles Lakers'},
      {seed:4,name:'Denver Nuggets'},
      {seed:5,name:'Minnesota Timberwolves'},
      {seed:6,name:'Houston Rockets'},
      {seed:7,name:'Phoenix Suns'},
      {seed:8,name:'LA Clippers'},
      {seed:9,name:'Portland Trail Blazers'},
      {seed:10,name:'Golden State Warriors'}
    ]
  }
};

const state = {
  east: { play7:null, play8:null, r1:{}, r2:{}, conf:null },
  west: { play7:null, play8:null, r1:{}, r2:{}, conf:null },
  finals: null
};

function teamLabel(t){ return t ? `${t.seed}. ${t.name}` : '—'; }
function cloneTeam(t){ return t ? {seed:t.seed, name:t.name} : null; }

function getConferenceField(confKey){
  const seeds = NBA[confKey].seeds;
  const bySeed = s => seeds.find(x => x.seed === s) || null;
  const play7 = state[confKey].play7 || bySeed(7);
  const play8 = state[confKey].play8 || bySeed(8);
  return {
    qf: [
      [bySeed(1), play8],
      [bySeed(4), bySeed(5)],
      [bySeed(3), bySeed(6)],
      [bySeed(2), play7]
    ],
    sf: [
      [state[confKey].r1.a || null, state[confKey].r1.b || null],
      [state[confKey].r1.c || null, state[confKey].r1.d || null]
    ],
    cf: [
      [state[confKey].r2.a || null, state[confKey].r2.b || null]
    ]
  };
}

function seriesSelect(value, onChange, isPlayIn=false){
  const wrap = document.createElement('div');
  wrap.className = 'nbaSeriesSelectWrap';
  const sel = document.createElement('select');
  sel.className = 'nbaSeriesSelect';
  const opts = isPlayIn ? ['1'] : ['4','5','6','7'];
  const blank = document.createElement('option');
  blank.value = '';
  blank.textContent = isPlayIn ? 'Win' : 'Games';
  sel.appendChild(blank);
  opts.forEach(v=>{
    const o = document.createElement('option');
    o.value = v; o.textContent = isPlayIn ? 'Advance' : v;
    if(String(value||'')===v) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', ()=>onChange(sel.value));
  wrap.appendChild(sel);
  return wrap;
}

function matchupCard(teamA, teamB, currentWinner, currentGames, onPick, isPlayIn=false){
  const card = document.createElement('div');
  card.className = 'nbaMatchupCard';
  card.appendChild(seriesSelect(currentGames, (val)=>{ card.dataset.games = val; }, isPlayIn));

  [teamA, teamB].forEach((team)=>{
    const btn = document.createElement('button');
    btn.className = 'nbaTeamBtn' + ((currentWinner && team && currentWinner.name===team.name) ? ' isWinner' : '');
    btn.type = 'button';
    btn.textContent = teamLabel(team);
    if(!team) btn.disabled = true;
    btn.addEventListener('click', ()=>{
      const games = card.querySelector('select').value;
      if(!games) return;
      onPick(cloneTeam(team), Number(games));
    });
    card.appendChild(btn);
  });
  return card;
}

function renderConference(confKey, title){
  const field = getConferenceField(confKey);
  const box = document.createElement('section');
  box.className = 'nbaConferenceBoard';
  box.innerHTML = `<h3>${title}</h3>`;

  const playInWrap = document.createElement('div');
  playInWrap.className = 'nbaRoundColumn';
  playInWrap.innerHTML = `<div class="nbaRoundTitle">Play-In</div>`;
  const s7 = NBA[confKey].seeds.find(x=>x.seed===7);
  const s8 = NBA[confKey].seeds.find(x=>x.seed===8);
  const s9 = NBA[confKey].seeds.find(x=>x.seed===9);
  const s10 = NBA[confKey].seeds.find(x=>x.seed===10);

  playInWrap.appendChild(matchupCard(s7,s8,state[confKey].play7,null,(winner)=>{
    state[confKey].play7 = winner;
    renderNBA();
  }, true));
  playInWrap.appendChild(matchupCard(s9,s10,state[confKey].play8,null,(winner)=>{
    state[confKey].play8 = winner;
    renderNBA();
  }, true));

  const r1 = document.createElement('div');
  r1.className = 'nbaRoundColumn';
  r1.innerHTML = `<div class="nbaRoundTitle">Round 1</div>`;
  const qf = field.qf;
  r1.appendChild(matchupCard(qf[0][0], qf[0][1], state[confKey].r1.a && state[confKey].r1.a.team, state[confKey].r1.a && state[confKey].r1.a.games, (winner,games)=>{ state[confKey].r1.a = {team:winner,games}; renderNBA(); }));
  r1.appendChild(matchupCard(qf[1][0], qf[1][1], state[confKey].r1.b && state[confKey].r1.b.team, state[confKey].r1.b && state[confKey].r1.b.games, (winner,games)=>{ state[confKey].r1.b = {team:winner,games}; renderNBA(); }));
  r1.appendChild(matchupCard(qf[2][0], qf[2][1], state[confKey].r1.c && state[confKey].r1.c.team, state[confKey].r1.c && state[confKey].r1.c.games, (winner,games)=>{ state[confKey].r1.c = {team:winner,games}; renderNBA(); }));
  r1.appendChild(matchupCard(qf[3][0], qf[3][1], state[confKey].r1.d && state[confKey].r1.d.team, state[confKey].r1.d && state[confKey].r1.d.games, (winner,games)=>{ state[confKey].r1.d = {team:winner,games}; renderNBA(); }));

  const r2 = document.createElement('div');
  r2.className = 'nbaRoundColumn';
  r2.innerHTML = `<div class="nbaRoundTitle">Conference Semis</div>`;
  const sf = field.sf;
  r2.appendChild(matchupCard(sf[0][0] && sf[0][0].team || sf[0][0], sf[0][1] && sf[0][1].team || sf[0][1], state[confKey].r2.a && state[confKey].r2.a.team, state[confKey].r2.a && state[confKey].r2.a.games, (winner,games)=>{ state[confKey].r2.a = {team:winner,games}; renderNBA(); }));
  r2.appendChild(matchupCard(sf[1][0] && sf[1][0].team || sf[1][0], sf[1][1] && sf[1][1].team || sf[1][1], state[confKey].r2.b && state[confKey].r2.b.team, state[confKey].r2.b && state[confKey].r2.b.games, (winner,games)=>{ state[confKey].r2.b = {team:winner,games}; renderNBA(); }));

  const r3 = document.createElement('div');
  r3.className = 'nbaRoundColumn';
  r3.innerHTML = `<div class="nbaRoundTitle">Conference Finals</div>`;
  const cfA = state[confKey].r2.a ? state[confKey].r2.a.team : null;
  const cfB = state[confKey].r2.b ? state[confKey].r2.b.team : null;
  r3.appendChild(matchupCard(cfA, cfB, state[confKey].conf && state[confKey].conf.team, state[confKey].conf && state[confKey].conf.games, (winner,games)=>{ state[confKey].conf = {team:winner,games}; renderNBA(); }));

  const grid = document.createElement('div');
  grid.className = 'nbaConferenceGrid';
  grid.append(playInWrap, r1, r2, r3);
  box.appendChild(grid);
  return box;
}

function renderFinals(){
  const box = document.createElement('section');
  box.className = 'nbaFinalsBoard';
  box.innerHTML = `<h3>NBA Finals</h3>`;
  const eastChamp = state.east.conf ? state.east.conf.team : null;
  const westChamp = state.west.conf ? state.west.conf.team : null;
  box.appendChild(matchupCard(eastChamp, westChamp, state.finals && state.finals.team, state.finals && state.finals.games, (winner,games)=>{ state.finals = {team:winner,games}; renderNBA(); }));
  const champ = document.createElement('div');
  champ.className = 'nbaChampionDisplay';
  champ.textContent = state.finals && state.finals.team ? `Champion: ${state.finals.team.name} in ${state.finals.games}` : 'Champion';
  box.appendChild(champ);
  return box;
}

function renderNBA(){
  const app = document.getElementById('nbaBracketApp');
  app.innerHTML = '';
  const layout = document.createElement('div');
  layout.className = 'nbaInteractiveLayout';
  layout.appendChild(renderConference('east','Eastern Conference'));
  layout.appendChild(renderFinals());
  layout.appendChild(renderConference('west','Western Conference'));
  app.appendChild(layout);
}
renderNBA();
</script>

<script>
document.querySelectorAll('.nbaSeedRow').forEach(el=>{
  el.onclick=()=>{
    el.style.background='#2563eb';
  };
});
</script>
</body>
</html>
