<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Featured Review</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-admin-featured page-challenge-standalone page-challenge-clean-header">
  <header class="topbar">
    <div class="brandWrap">
      <div class="brandRow">
        <div class="brand">Bracketology Builder</div>
        <img alt="Bracketology Builder logo" class="brandLogo" src="/logo.svg"/>
      </div>
      <div class="subbrand">Presented by <span class="creator">RobbyBrackets</span></div>
    </div>
    <div class="actions"></div>
  </header>

  <div class="stickyNav">
    <nav aria-label="Primary" class="siteNav">
      <a class="navLink" href="/">Home</a>
      <a class="navLink" href="best-challenge.html">Best Bracket Challenge</a>
      <a class="navLink" href="worst-challenge.html">Worst Bracket Challenge</a>

      <a class="navLink" href="/#featured">Featured Brackets</a>

  <main class="wrap">
    <div class="panel" id="adminGatePanel">
      <div class="panelHead"><h2 style="margin:0;">Featured Brackets Review</h2></div>
      <div id="adminGateMsg" class="muted">Loading…</div>

    <section class="panel" id="adminFeaturedPanel" style="display:none;">
      <div class="panelHead"><h2 style="margin:0;">Featured Brackets Review</h2></div>
      <div id="adminFeaturedStatus" class="muted" style="margin-bottom:12px;"></div>

      <h3 style="margin:8px 0;">Pending</h3>
      <div id="adminFeaturedPending"></div>

      <h3 style="margin:16px 0 8px;">Approved</h3>
      <div id="adminFeaturedApproved"></div>

      <h3 style="margin:16px 0 8px;">Rejected</h3>
      <div id="adminFeaturedDenied"></div>
    </section>
  </main>

  <script src="/admin-featured.js"></script>

</html>
