<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket Games</title>
  <link rel="stylesheet" href="/style.css?vbgfix2">
  <style>
    .gamesTopBar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    .gameTopBtn,.gamePicker{
      padding:14px 20px;border-radius:999px;border:1px solid #d1d5db;background:#fff;color:#111827;
      font-size:16px;font-weight:800;min-height:52px
    }
    .gameTopBtn.primary{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .gamePicker{min-width:220px}
    .gamesBracketLayout{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;align-items:start}
    .gameRoundColumn,.gameChampionBox{border:1px solid #e5e7eb;border-radius:16px;background:#fff;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .gameRoundTitle{font-weight:900;margin-bottom:10px;color:#111827}
    .gameMatchupCard{border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc;padding:10px;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .gamePlayerBtn{width:100%;text-align:left;border:1px solid #d1d5db;border-radius:12px;padding:10px 12px;background:#fff;color:#111827;font-weight:800;cursor:pointer;position:relative}
    .gamePlayerBtn.isWinner{background:#2563eb;color:#fff;border-color:#2563eb}
    .gamePlayerBtn.isIncorrect{outline:3px solid #ef4444}
    .gameRevealMeta{display:block;font-size:12px;font-weight:700;margin-top:4px;opacity:0.95}
    .gameMark{display:block;font-size:14px;font-weight:900;margin-top:4px}
    .gameChampChoices{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    @media (max-width:1024px){.gamesBracketLayout{grid-template-columns:1fr 1fr;}}
    @media (max-width:700px){.gamesBracketLayout{grid-template-columns:1fr;}}
  </style>
</head>
<body class="page-challenge-standalone page-challenge-clean-header">
  <header class="topbar">
    <div class="brandWrap">
      <div class="brandRow">
        <div class="brand">Bracketology Builder</div>
        <img alt="Bracketology Builder logo" class="brandLogo" src="/logo.svg"/>
      </div>
      <div class="subbrand">Presented by <span class="creator">RobbyBrackets</span></div>
    </div>
    <div class="actions"></div>
  </header>

  <div class="stickyNav">
    <nav aria-label="Primary" class="siteNav">
      <a class="navLink" href="/">Home</a>
      <a class="navLink" href="my-brackets.html">My Brackets</a>
      <a class="navLink" href="best-challenge.html">Best Bracket Challenge</a>
      <a class="navLink" href="worst-challenge.html">Worst Bracket Challenge</a>
      <a class="navLink" href="nba.html">NBA Bracket</a>
      <a class="navLink active" href="bracket-games.html">Bracket Games</a>
      <a class="navLink" href="/#featured">Featured Brackets</a>
      <a class="navLink" href="/#upcoming">Upcoming Events</a>
    </nav>
  </div>

  <main class="wrap">
    <div class="panel">
      <div class="panelHead">
        <h2>Bracket Games</h2>
        <div id="gameSubhead" class="subhead">Pick who you think is taller. Reveal the answers when you’re done.</div>
      </div>

      <div class="gamesTopBar">
        <button id="currentGameBtn" class="gameTopBtn primary" type="button">The Height Game</button>
        <button id="newGameBtn" class="gameTopBtn" type="button">Replay With New Players</button>
        <button id="revealBtn" class="gameTopBtn" type="button">Reveal Answers</button>
        <select id="modeSelect" class="gamePicker">
          <option value="height">Pick Another Game</option>
          <option value="age">The Age Game</option>
          <option value="points">The Career Points Game</option>
        </select>
        <span id="scoreText" class="tinyMuted"></span>
      </div>

      <div id="gameBracket"></div>
    </div>
  </main>

<script>
const PLAYER_POOL = [
  { name:"LeBron James", feet:6, inches:9, age:40, points:40474 },
  { name:"Kevin Durant", feet:6, inches:11, age:36, points:28924 },
  { name:"Stephen Curry", feet:6, inches:2, age:37, points:24866 },
  { name:"Giannis Antetokounmpo", feet:6, inches:11, age:30, points:19735 },
  { name:"Jayson Tatum", feet:6, inches:8, age:27, points:13216 },
  { name:"Luka Doncic", feet:6, inches:7, age:26, points:12439 },
  { name:"Joel Embiid", feet:7, inches:0, age:31, points:12000 },
  { name:"Nikola Jokic", feet:6, inches:11, age:30, points:15485 },
  { name:"Devin Booker", feet:6, inches:6, age:28, points:15597 },
  { name:"Jimmy Butler", feet:6, inches:7, age:35, points:13148 },
  { name:"Anthony Edwards", feet:6, inches:4, age:23, points:6590 },
  { name:"Ja Morant", feet:6, inches:2, age:25, points:5523 },
  { name:"Kawhi Leonard", feet:6, inches:7, age:33, points:14014 },
  { name:"Paul George", feet:6, inches:8, age:34, points:18303 },
  { name:"Damian Lillard", feet:6, inches:2, age:34, points:22398 },
  { name:"Zion Williamson", feet:6, inches:6, age:24, points:4752 },
  { name:"Anthony Davis", feet:6, inches:10, age:32, points:18301 },
  { name:"Victor Wembanyama", feet:7, inches:4, age:21, points:3162 },
  { name:"Tyrese Haliburton", feet:6, inches:5, age:25, points:6354 },
  { name:"Kyrie Irving", feet:6, inches:2, age:33, points:18149 },
  { name:"Shai Gilgeous-Alexander", feet:6, inches:6, age:26, points:9635 },
  { name:"Jalen Brunson", feet:6, inches:2, age:28, points:9098 },
  { name:"Karl-Anthony Towns", feet:7, inches:0, age:29, points:14156 },
  { name:"Donovan Mitchell", feet:6, inches:3, age:28, points:13013 },
  { name:"Jaylen Brown", feet:6, inches:6, age:28, points:11944 },
  { name:"Trae Young", feet:6, inches:1, age:26, points:11495 },
  { name:"Paolo Banchero", feet:6, inches:10, age:22, points:4393 },
  { name:"Chet Holmgren", feet:7, inches:1, age:23, points:1425 },
  { name:"Tyrese Maxey", feet:6, inches:2, age:24, points:5531 },
  { name:"De'Aaron Fox", feet:6, inches:3, age:27, points:11750 },
  { name:"Bam Adebayo", feet:6, inches:9, age:27, points:9341 },
  { name:"Jamal Murray", feet:6, inches:4, age:28, points:8657 },
  { name:"Brandon Ingram", feet:6, inches:8, age:27, points:9732 },
  { name:"Mikal Bridges", feet:6, inches:6, age:28, points:7806 },
  { name:"Darius Garland", feet:6, inches:1, age:25, points:6389 },
  { name:"Pascal Siakam", feet:6, inches:8, age:31, points:12361 },
  { name:"Jrue Holiday", feet:6, inches:4, age:34, points:16007 },
  { name:"LaMelo Ball", feet:6, inches:7, age:23, points:4331 },
  { name:"Domantas Sabonis", feet:6, inches:10, age:29, points:9788 },
  { name:"Alperen Sengun", feet:6, inches:11, age:22, points:3858 }
];

const MODES = {
  height: {
    title: 'The Height Game',
    subhead: 'Pick who you think is taller. Reveal the answers when you’re done.',
    compareValue: (p) => (p.feet * 12) + p.inches,
    reveal: (p) => `${p.feet}'${p.inches}"`
  },
  age: {
    title: 'The Age Game',
    subhead: 'Pick who you think is older. Reveal the answers when you’re done.',
    compareValue: (p) => p.age,
    reveal: (p) => `${p.age} years old`
  },
  points: {
    title: 'The Career Points Game',
    subhead: 'Pick who you think has more career points. Reveal the answers when you’re done.',
    compareValue: (p) => p.points,
    reveal: (p) => `${Number(p.points).toLocaleString()} points`
  }
};

const state = {
  players: [],
  picks: { r1: {}, r2: {}, r3: {}, champ: null },
  reveal: false,
  mode: 'height'
};

function shuffle(arr){
  const copy = [...arr];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function samplePlayers(){ return shuffle(PLAYER_POOL).slice(0, 16); }
function samePlayer(a, b){ return !!a && !!b && a.name === b.name; }
function compareResult(a, b){
  if(!a && !b) return { winner:null, tied:false };
  if(!a) return { winner:b || null, tied:false };
  if(!b) return { winner:a || null, tied:false };
  const av = MODES[state.mode].compareValue(a);
  const bv = MODES[state.mode].compareValue(b);
  if(av === bv) return { winner:null, tied:true };
  return { winner: av > bv ? a : b, tied:false };
}
function getWinner(a,b){ return compareResult(a,b).winner; }
function revealLabel(player){ return player ? MODES[state.mode].reveal(player) : ''; }
function clearDownstream(fromRound){
  if(fromRound <= 1){ state.picks.r2 = {}; state.picks.r3 = {}; state.picks.champ = null; }
  else if(fromRound === 2){ state.picks.r3 = {}; state.picks.champ = null; }
  else if(fromRound === 3){ state.picks.champ = null; }
}
function roundOnePlayers(){ return state.players; }
function roundTwoPlayers(){ const out=[]; for(let i=0;i<8;i++) out.push(state.picks.r1[i] || null); return out; }
function finalFourPlayers(){ const out=[]; for(let i=0;i<4;i++) out.push(state.picks.r2[i] || null); return out; }
function championshipPlayers(){ return [state.picks.r3[0] || null, state.picks.r3[1] || null]; }
function setPick(roundKey, index, player){
  state.picks[roundKey][index] = player;
  if(roundKey === 'r1') clearDownstream(1);
  else if(roundKey === 'r2') clearDownstream(2);
  else if(roundKey === 'r3') clearDownstream(3);
  renderGame();
}
function setChampion(player){ state.picks.champ = player; renderGame(); }

function decorateReveal(btn, player, actualWinner, tied){
  if(!state.reveal || !player) return;
  const meta = document.createElement('div');
  meta.className = 'gameRevealMeta';
  let text = revealLabel(player);

  const picked = btn.classList.contains('isWinner');
  if(tied){
    if(picked) text = '✓ ' + text;
  } else {
    if(picked && samePlayer(player, actualWinner)) text = '✓ ' + text;
    else if(picked && !samePlayer(player, actualWinner)){
      text = '✗ ' + text;
      btn.classList.add('isIncorrect');
    }
  }
  meta.textContent = text;
  btn.appendChild(meta);
}

function matchupCard(a, b, currentWinner, onPick){
  const card = document.createElement('div');
  card.className = 'gameMatchupCard';
  const result = compareResult(a,b);
  const actualWinner = result.winner;
  const tied = result.tied;

  [a, b].forEach((player)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'gamePlayerBtn' + (samePlayer(player, currentWinner) ? ' isWinner' : '');
    btn.textContent = player ? player.name : '—';
    if(!player) btn.disabled = true;
    else btn.addEventListener('click', ()=>onPick(player));
    decorateReveal(btn, player, actualWinner, tied);
    card.appendChild(btn);
  });
  return card;
}

function renderRound(title, players, winnersNeeded, currentMap, onPick){
  const col = document.createElement('div');
  col.className = 'gameRoundColumn';
  const head = document.createElement('div');
  head.className = 'gameRoundTitle';
  head.textContent = title;
  col.appendChild(head);
  for(let i=0;i<winnersNeeded;i++){
    const a = players[i*2] || null;
    const b = players[i*2 + 1] || null;
    col.appendChild(matchupCard(a, b, currentMap[i] || null, (player)=>onPick(i, player)));
  }
  return col;
}

function renderChampionBox(){
  const box = document.createElement('div');
  box.className = 'gameChampionBox';
  const title = document.createElement('div');
  title.className = 'gameRoundTitle';
  title.textContent = 'Champion';
  box.appendChild(title);

  const finalPair = championshipPlayers();
  const champ = document.createElement('div');
  champ.className = 'gameChampionDisplay';
  champ.style.cssText = 'margin-bottom:10px;padding:12px;border-radius:12px;background:#111827;color:#fff;font-weight:900;';
  champ.textContent = state.picks.champ ? state.picks.champ.name : 'Pick Champion';
  if(state.reveal && state.picks.champ){
    const result = compareResult(finalPair[0], finalPair[1]);
    champ.textContent = state.picks.champ.name + ((result.tied || samePlayer(state.picks.champ, result.winner)) ? ' ✓' : ' ✗') + ' • ' + revealLabel(state.picks.champ);
  }
  box.appendChild(champ);

  const pairWrap = document.createElement('div');
  pairWrap.className = 'gameChampChoices';
  const result = compareResult(finalPair[0], finalPair[1]);
  finalPair.forEach(player=>{
    const choice = document.createElement('button');
    choice.type = 'button';
    choice.className = 'gamePlayerBtn' + (samePlayer(player, state.picks.champ) ? ' isWinner' : '');
    choice.textContent = player ? player.name : '—';
    if(!player) choice.disabled = true;
    else choice.addEventListener('click', ()=>setChampion(player));
    decorateReveal(choice, player, result.winner, result.tied);
    pairWrap.appendChild(choice);
  });
  box.appendChild(pairWrap);
  return box;
}

function calculateScore(){
  let correct = 0, total = 0;
  const r1 = roundOnePlayers();
  for(let i=0;i<8;i++){
    const result = compareResult(r1[i*2], r1[i*2+1]);
    if(state.picks.r1[i]) total++;
    if(state.picks.r1[i] && (result.tied || samePlayer(state.picks.r1[i], result.winner))) correct++;
  }
  const r2 = roundTwoPlayers();
  for(let i=0;i<4;i++){
    const result = compareResult(r2[i*2], r2[i*2+1]);
    if(state.picks.r2[i]) total++;
    if(state.picks.r2[i] && (result.tied || samePlayer(state.picks.r2[i], result.winner))) correct++;
  }
  const r3 = finalFourPlayers();
  for(let i=0;i<2;i++){
    const result = compareResult(r3[i*2], r3[i*2+1]);
    if(state.picks.r3[i]) total++;
    if(state.picks.r3[i] && (result.tied || samePlayer(state.picks.r3[i], result.winner))) correct++;
  }
  const finalPair = championshipPlayers();
  const result = compareResult(finalPair[0], finalPair[1]);
  if(state.picks.champ) total++;
  if(state.picks.champ && (result.tied || samePlayer(state.picks.champ, result.winner))) correct++;
  return { correct, total };
}

function renderGame(){
  document.getElementById('currentGameBtn').textContent = MODES[state.mode].title;
  document.getElementById('gameSubhead').textContent = MODES[state.mode].subhead;

  const mount = document.getElementById('gameBracket');
  mount.innerHTML = '';
  const layout = document.createElement('div');
  layout.className = 'gamesBracketLayout';
  layout.appendChild(renderRound('Round 1', roundOnePlayers(), 8, state.picks.r1, (i, player)=>setPick('r1', i, player)));
  layout.appendChild(renderRound('Quarterfinals', roundTwoPlayers(), 4, state.picks.r2, (i, player)=>setPick('r2', i, player)));
  layout.appendChild(renderRound('Semifinals', finalFourPlayers(), 2, state.picks.r3, (i, player)=>setPick('r3', i, player)));
  layout.appendChild(renderChampionBox());
  mount.appendChild(layout);
  document.getElementById('scoreText').textContent = state.reveal ? `Score: ${calculateScore().correct} / ${calculateScore().total}` : '';
}

function newGame(){
  state.players = samplePlayers();
  state.picks = { r1: {}, r2: {}, r3: {}, champ: null };
  state.reveal = false;
  renderGame();
}

document.getElementById('modeSelect').addEventListener('change', (e)=>{
  const val = e.target.value;
  if(val === 'height' || val === 'age' || val === 'points'){
    state.mode = val;
    newGame();
    e.target.value = 'height';
  }
});
document.getElementById('newGameBtn').addEventListener('click', newGame);
document.getElementById('revealBtn').addEventListener('click', ()=>{ state.reveal = true; renderGame(); });

state.mode = 'height';
newGame();
</script>
</body>
</html>
