<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Canceled | Bracketology Builder</title>
  <link rel="stylesheet" href="/style.css?v=20260207f" />
  <style>
    body{background:#08111f;color:#fff}.wrapCancel{max-width:720px;margin:0 auto;padding:32px 16px}.panelCancel{background:#0f1f3d;border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,.09)}a.btnish{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 16px;text-decoration:none;font-weight:800;background:#4da3ff;color:#08111f;margin-right:10px}
  </style>
</head>
<body>
  <main class="wrapCancel">
    <section class="panelCancel">
      <div style="display:inline-block;background:#fee2e2;color:#991b1b;font-weight:800;border-radius:999px;padding:6px 10px;margin-bottom:10px">Checkout Canceled</div>
      <h1 style="margin-top:0">No order was placed.</h1>
      <p>Your reserved item will be released back into inventory shortly.</p>
      <a class="btnish" href="/merch">Back to Merch</a>
      <a class="btnish" href="/home.html">Go to BracketologyBuilder</a>
    </section>
  </main>
  <script>
    (async function(){
      const sp = new URLSearchParams(location.search);
      const sessionId = sp.get('reservation_id') || sp.get('session_id');
      if(!sessionId) return;
      try{
        await fetch('/api/merch-release', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
      }catch(_e){}
    })();
  </script>
</body>
</html>
