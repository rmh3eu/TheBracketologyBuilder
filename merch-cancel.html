<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Checkout Canceled | Bracketology Builder</title>
  <link href="/favicon.svg" rel="icon" type="image/svg+xml"/>
  <link href="./style.css?v=20260406-merch1" rel="stylesheet"/>
  <style>
    .miniWrap{max-width:760px;margin:0 auto;padding:26px 14px 46px}.miniCard{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:24px;box-shadow:0 10px 26px rgba(15,23,42,.08)}
    .miniTitle{font-size:34px;line-height:1.05;margin:0 0 10px}.miniP{font-size:16px;color:#4b5563;line-height:1.55}.miniBtnRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  </style>
</head>
<body>
<header class="topbar"><div class="brandWrap"><div class="brandRow"><div class="brand">Bracketology Builder</div><img alt="Bracketology Builder logo" class="brandLogo" src="/logo.svg"/></div><div class="subbrand">Presented by <span class="creator">RobbyBrackets</span></div></div><div class="actions"></div></header>
<main class="miniWrap">
  <section class="miniCard">
    <div class="pill">Checkout canceled</div>
    <h1 class="miniTitle">No problem</h1>
    <p class="miniP">Your shirt was not purchased. If your held size is still available, it should return to stock shortly.</p>
    <div class="miniBtnRow">
      <a class="btn" href="/merch">Try again</a>
      <a class="btn ghost" href="/">Back to Home</a>
    </div>
  </section>
</main>
<script>
(async function(){
  const qs = new URLSearchParams(location.search);
  const reservationId = qs.get('reservation_id');
  if(!reservationId) return;
  try{
    await fetch('/api/merch-release', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ reservation_id: reservationId })
    });
  }catch(_e){}
})();
</script>
</body>
</html>
