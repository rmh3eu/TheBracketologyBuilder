<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Bracket Challenge Leaderboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-challenge-leaderboard">
  <div class="pageWrap">
    <div class="panel leaderboardPagePanel">
      <div class="leaderboardPageHeader">
        <h1>😇 Best Bracket Challenge Leaderboard</h1>
        <a class="btn ghost" href="/#best">← Back to Best Bracket Challenge</a>
      </div>

      <div class="panel" style="margin-bottom:16px">
        <div class="panelHead"><h3 style="margin:0">Enter a bracket</h3></div>
        <div style="padding:12px 16px">
          <div id="bestActions"></div>
          <div id="bestEntryMount"></div>
        </div>
      </div>

      <div id="bestLeaderboard" class="leaderboardPageMount">
        <div class="muted">Loading leaderboard…</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try{ if (typeof loadMe === 'function') await loadMe(); }catch(_e){}
      try{ if (typeof renderBestActions === 'function') await renderBestActions(); }catch(_e){}
      try{ if (typeof renderBestLeaderboard === 'function') await renderBestLeaderboard(); }catch(_e){
        const mount = document.getElementById('bestLeaderboard');
        if (mount) mount.innerHTML = '<div class="muted">Could not load leaderboard.</div>';
      }
    });
  </script>
</body>
</html>
