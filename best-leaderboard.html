<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Bracket Challenge Leaderboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-challenge-leaderboard">
  <div class="pageWrap">
    <div class="panel leaderboardPagePanel">
      <div class="leaderboardPageHeader">
        <h1>😇 Best Bracket Challenge Leaderboard</h1>
        <a class="btn ghost" href="/#best">← Back to Best Bracket Challenge</a>
      </div>
      <div id="bestLeaderboardMount" class="leaderboardPageMount">
        <div class="muted">Loading leaderboard…</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const mount = document.getElementById('bestLeaderboardMount');
      try {
        if (typeof api !== 'function') throw new Error('API not available');
        const d = await api('/api/leaderboard?type=best', { method:'GET' });
        const items = (d && (d.rows || d.leaderboard || d.items || d.entries)) || [];
        mount.innerHTML = '';

        if (!items.length) {
          mount.innerHTML = '<div class="muted">No entries yet.</div>';
          return;
        }

        const card = document.createElement('div');
        card.className = 'panel';
        const title = document.createElement('div');
        title.className = 'leaderboardCardTitle';
        title.textContent = 'Overall standings';
        const subtitle = document.createElement('div');
        subtitle.className = 'leaderboardCardSubtitle';
        subtitle.textContent = 'Best Bracket Challenge (pick winners)';
        const list = document.createElement('div');
        list.className = 'leaderboardStandaloneList';

        items.forEach((row, i) => {
          const item = document.createElement('div');
          item.className = 'leaderboardStandaloneRow';
          const name = row.display_name || row.name || row.username || row.user_name || row.title || row.bracket_name || 'User';
          const score = (row.score ?? row.points ?? row.total ?? 0);
          item.innerHTML = `
            <div class="lsRank">${i+1}</div>
            <div class="lsName">${name}</div>
            <div class="lsScore">${score}</div>
          `;
          list.appendChild(item);
        });

        card.appendChild(title);
        card.appendChild(subtitle);
        card.appendChild(list);
        mount.appendChild(card);
      } catch (e) {
        mount.innerHTML = '<div class="muted">Could not load leaderboard.</div>';
      }
    });
  </script>
</body>
</html>
