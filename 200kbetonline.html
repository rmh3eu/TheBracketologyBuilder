  <style>
    :root{
      --black:#07070b;
      --red:#ef2d2d;
      --white:#f5f7fb;
      --muted:#c6ccda;
      --line:#1a1d26;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--white);
      background:
        radial-gradient(circle at 75% 25%, rgba(239,45,45,.16), transparent 26%),
        linear-gradient(180deg, #08080c 0%, #11131a 100%);
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(760px,100%);
      border-radius:28px;
      padding:30px 28px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      text-align:left;
    }
    .brand{
      font-weight:900;
      font-size:clamp(28px,6vw,48px);
      line-height:1;
      letter-spacing:.01em;
      margin-bottom:18px;
    }
    .brand .bet{color:var(--red)}
    .brand .online{color:var(--white)}
    h1{
      margin:0 0 14px;
      font-size:clamp(34px,7vw,54px);
      line-height:1.02;
      max-width:700px;
    }
    .money{color:var(--red)}
    p{
      margin:0;
      font-size:clamp(20px,3.7vw,28px);
      line-height:1.38;
      color:var(--white);
      max-width:680px;
    }
    .sub{
      margin-top:16px;
      font-size:clamp(15px,2.6vw,18px);
      color:var(--muted);
    }
    .spinnerRow{
      display:flex;
      align-items:center;
      gap:12px;
      margin-top:24px;
      color:var(--muted);
      font-size:15px;
    }
    .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.18);
      border-top-color:var(--red);
      animation:spin .8s linear infinite;
      flex:0 0 auto;
    }
    .disc{
      margin-top:28px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:12px;
      line-height:1.45;
      color:#98a0b3;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:700px){
      .wrap{padding:0}
      .card{
        min-height:100vh;
        width:100%;
        border-radius:0;
        display:flex;
        flex-direction:column;
        justify-content:center;
        padding:32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand"><span class="bet">BET</span><span class="online">ONLINE</span></div>
      <h1>Redirecting to the <span class="money">$200K</span><br>Bracket Contest</h1>
      <p>Taking you to the BetOnline $200 in Bonus with Sign Up now.</p>
      <div class="spinnerRow">
        <div class="spinner" aria-hidden="true"></div>
        <div>Redirecting automatically…</div>
      </div>
      <div class="disc">21+. Gambling problem? Call 1-800-GAMBLER. Not available in all states. Terms apply.</div>
    </div>
  </div>
</body>
</html>
